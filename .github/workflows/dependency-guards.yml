name: Dependency Guards

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  litellm-min-version:
    name: Enforce LiteLLM minimum safe version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install packaging
        run: python -m pip install --disable-pip-version-check packaging

      - name: Verify litellm minimum version in requirements.txt
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          from packaging.version import Version

          requirements_path = Path("requirements.txt")
          minimum_safe_version = Version("1.83.7")

          if not requirements_path.exists():
              raise SystemExit("requirements.txt not found")

          requirement_line = None
          for raw_line in requirements_path.read_text(encoding="utf-8").splitlines():
              line = raw_line.strip()
              if not line or line.startswith("#"):
                  continue
              if re.match(r"(?i)^litellm\s*==\s*", line):
                  requirement_line = line
                  break

          if requirement_line is None:
              raise SystemExit("litellm pin not found in requirements.txt")

          match = re.match(r"(?i)^litellm\s*==\s*([^\s;]+)", requirement_line)
          if match is None:
              raise SystemExit(f"Unable to parse litellm requirement: {requirement_line}")

          pinned_version = Version(match.group(1))
          if pinned_version < minimum_safe_version:
              raise SystemExit(
                  f"litellm {pinned_version} is below minimum safe version {minimum_safe_version} "
                  "(GHSA-r75f-5x8p-qvmc / CVE-2026-42208)"
              )

          print(
              f"litellm {pinned_version} satisfies minimum safe version {minimum_safe_version}"
          )
          PY
